version: '3.8'
services:
  mysql:
    image: mysql:8
    container_name: hostel_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hostel_db
      MYSQL_USER: hostel_user
      MYSQL_PASSWORD: hostel_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
