spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8080

# Database Configuration (TiDB / MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Secret should be overridden via ENV in prod)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Security Hardening: Encryption & Hash Keys
app.security.encryption.secret=${APP_ENCRYPTION_SECRET}
app.security.hash.salt=${APP_HASH_SALT}

# File upload settings for bank statement import
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

