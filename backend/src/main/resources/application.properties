spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# Server Configuration
server.port=8080

# CORS — override in Render env vars with your Vercel production URL
# e.g. app.cors.allowed-origins=https://your-app.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT Cookie settings
# In production (Render): set app.cookie.secure=true, app.cookie.same-site=None
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# Database Configuration (TiDB / MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Server Compression
server.compression.enabled=true
server.port=8080
server.compression.min-response-size=1024

# JWT Configuration (Secret should be overridden via ENV in prod)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Security Hardening: Encryption & Hash Keys
app.security.encryption.secret=${APP_ENCRYPTION_SECRET}
app.security.encryption.old-secret=${APP_ENCRYPTION_OLD_SECRET:}
app.security.hash.salt=${APP_HASH_SALT}
app.security.hash.old-salt=${APP_HASH_OLD_SALT:}

app.security.payload.secret=${APP_PAYLOAD_SECRET}

# File upload settings for bank statement import
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator — only expose health, never expose env/beans/mappings in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

